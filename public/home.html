<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>浦西Game</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
  background: linear-gradient(135deg, #0a0e1a 0%, #1a1040 40%, #0d1530 100%);
  color: #e0e0e0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.hero {
  text-align: center;
  margin-bottom: 56px;
}
.hero h1 {
  font-size: 3.2rem;
  font-weight: 900;
  letter-spacing: 2px;
  background: linear-gradient(135deg, #a78bfa 0%, #60a5fa 50%, #34d399 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 12px;
}
.hero p {
  font-size: 1.1rem;
  color: rgba(160,170,200,0.6);
  font-weight: 400;
}
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 28px;
  max-width: 800px;
  width: 100%;
}
.game-card {
  position: relative;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 20px;
  padding: 40px 32px;
  text-decoration: none;
  color: inherit;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
}
.game-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: radial-gradient(circle at 50% 0%, var(--glow), transparent 70%);
  opacity: 0;
  transition: opacity 0.3s;
}
.game-card:hover::before { opacity: 1; }
.game-card:hover {
  transform: translateY(-6px);
  border-color: var(--border);
  box-shadow: 0 20px 60px var(--shadow);
}
.game-card > * { position: relative; z-index: 1; }
.card-icon {
  font-size: 4rem;
  margin-bottom: 20px;
  display: block;
  line-height: 1;
}
.card-title {
  font-size: 1.4rem;
  font-weight: 700;
  margin-bottom: 10px;
}
.card-desc {
  font-size: 0.9rem;
  color: rgba(160,170,200,0.6);
  line-height: 1.6;
}
.card-arrow {
  margin-top: 24px;
  font-size: 0.85rem;
  color: var(--accent);
  font-weight: 600;
  opacity: 0;
  transform: translateX(-8px);
  transition: all 0.3s;
}
.game-card:hover .card-arrow {
  opacity: 1;
  transform: translateX(0);
}

/* Card 1 - MTG */
.game-card.mtg {
  --glow: rgba(99,102,241,0.15);
  --border: rgba(99,102,241,0.4);
  --shadow: rgba(99,102,241,0.15);
  --accent: #818cf8;
}
/* Card 2 - Guess Song */
.game-card.song {
  --glow: rgba(245,158,11,0.15);
  --border: rgba(245,158,11,0.4);
  --shadow: rgba(245,158,11,0.15);
  --accent: #fbbf24;
}

.footer {
  margin-top: 56px;
  font-size: 0.75rem;
  color: rgba(160,170,200,0.25);
}

@media (max-width: 680px) {
  .hero h1 { font-size: 2.2rem; }
  .cards { grid-template-columns: 1fr; gap: 20px; }
  .game-card { padding: 28px 24px; }
}
</style>
</head>
<body>

<div class="hero">
  <h1>浦西Game</h1>
  <p>选择一个游戏开始吧</p>
</div>

<div class="cards">
  <a class="game-card mtg" href="/dashboard">
    <span class="card-icon">&#x1F0CF;</span>
    <div class="card-title">万智牌限制赛</div>
    <div class="card-desc">轮抓 &amp; 现开 &amp; 对战平台<br>组牌、对战、管理你的赛事</div>
    <div class="card-arrow">进入 &rarr;</div>
  </a>

  <a class="game-card song" href="/guessSong">
    <span class="card-icon">&#x1F3B5;</span>
    <div class="card-title">猜歌挑战</div>
    <div class="card-desc">听前奏猜动漫歌曲<br>看看你是不是真正的二次元</div>
    <div class="card-arrow">进入 &rarr;</div>
  </a>
</div>

<div class="footer">PuxiGame &copy; 2025</div>

</body>
</html>
