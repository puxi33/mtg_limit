<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MTG 对战</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    /* ========== MTGA Arena Style ========== */
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(180deg, #080c18 0%, #0d1225 50%, #0a0f1e 100%);
      color: #d8dce8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    #battle-root {
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      width: 100%;
      max-width: none;
      margin: 0;
      padding: 0;
      height: 100%;
    }

    /* Board: full-bleed, no padding */
    .mtga-board {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0;
      padding: 0;
      overflow: hidden;
      min-height: 0;
    }

    /* Zone rows: fill space, no gaps */
    .mtga-zones-row {
      display: flex;
      gap: 0;
      align-items: stretch;
      flex: 1;
      min-height: 0;
    }

    /* Battlefield: main play area */
    .mtga-zone-battlefield {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      background: linear-gradient(180deg, rgba(20, 30, 55, 0.3) 0%, rgba(15, 22, 40, 0.5) 100%);
      position: relative;
    }
    .mtga-zone-battlefield::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 10%;
      right: 10%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(100, 120, 180, 0.15), transparent);
    }

    /* Zones: no borders, subtle backgrounds */
    .mtga-zone {
      border: none;
      border-radius: 0;
      padding: 0;
      background: transparent;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Zone labels: subtle, MTGA-style */
    .mtga-zone-label {
      position: absolute;
      top: 6px;
      left: 8px;
      font-size: 0.6rem;
      color: rgba(180, 190, 210, 0.4);
      z-index: 2;
      pointer-events: none;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 600;
    }
    .mtga-zone-sublabel {
      font-size: 0.6rem;
      color: rgba(180, 190, 210, 0.3);
      margin-top: 16px;
      margin-bottom: 2px;
    }

    /* Info bar: player status strip */
    .mtga-info-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 6px 12px;
      background: linear-gradient(180deg, rgba(15, 20, 35, 0.8) 0%, rgba(12, 16, 28, 0.9) 100%);
      border-radius: 0;
      font-size: 0.82rem;
      flex-shrink: 0;
    }
    .mtga-player-name {
      font-weight: 600;
      color: rgba(220, 225, 240, 0.85);
      font-size: 0.85rem;
    }

    /* Life total: large, prominent, MTGA-style */
    .mtga-life {
      font-size: 1.4rem;
      font-weight: 800;
      color: #e8ecf5;
      min-width: 40px;
      text-align: center;
      text-shadow: 0 0 12px rgba(100, 180, 100, 0.3);
      cursor: pointer;
      transition: color 0.2s, text-shadow 0.2s;
      line-height: 1;
      padding: 2px 8px;
      border-radius: 4px;
      background: rgba(40, 80, 40, 0.15);
    }
    .mtga-life:hover {
      color: #fff;
      text-shadow: 0 0 16px rgba(100, 200, 100, 0.5);
    }
    .mtga-life.low {
      color: #e74c3c;
      text-shadow: 0 0 12px rgba(231, 76, 60, 0.4);
      background: rgba(120, 30, 30, 0.2);
    }

    .mtga-stat {
      font-size: 0.75rem;
      color: rgba(160, 170, 195, 0.6);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .mtga-stat .num {
      font-weight: 700;
      color: rgba(200, 210, 230, 0.8);
    }

    /* Hand area */
    .mtga-hand {
      flex-shrink: 0;
      position: relative;
      height: 140px;
      background: linear-gradient(180deg, rgba(12, 18, 32, 0.7) 0%, rgba(8, 12, 22, 0.95) 100%);
      border-radius: 0;
      border: none;
      border-top: 1px solid rgba(80, 100, 140, 0.1);
      overflow: visible;
    }
    .mtga-hand-inner {
      position: relative;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Action bar: bottom toolbar */
    .mtga-action-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background: linear-gradient(180deg, rgba(12, 16, 28, 0.95) 0%, rgba(8, 12, 20, 1) 100%);
      border-top: 1px solid rgba(80, 100, 140, 0.1);
      flex-shrink: 0;
    }

    /* Win banner */
    .mtga-win-banner {
      text-align: center;
      padding: 10px;
      font-size: 1.15rem;
      font-weight: 700;
      color: #d4a043;
      background: linear-gradient(180deg, rgba(40, 30, 10, 0.6) 0%, rgba(20, 15, 5, 0.8) 100%);
      border-top: 1px solid rgba(212, 160, 67, 0.2);
      flex-shrink: 0;
      text-shadow: 0 0 20px rgba(212, 160, 67, 0.3);
    }

    /* Library stack */
    .mtga-library-stack {
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 2px 6px;
      border-radius: 4px;
      transition: background 0.2s;
    }
    .mtga-library-stack:hover {
      background: rgba(40, 50, 80, 0.4);
    }
    .mtga-lib-card {
      width: 24px;
      height: 32px;
      background: linear-gradient(135deg, #1a2540, #253560);
      border: 1px solid rgba(80, 100, 150, 0.3);
      border-radius: 3px;
      position: relative;
    }
    .mtga-lib-card:not(:first-child) {
      margin-left: -18px;
    }
    .mtga-lib-count {
      font-size: 0.75rem;
      font-weight: 700;
      color: rgba(180, 190, 210, 0.7);
    }

    /* Hide nav */
    .navbar, #navbar { display: none !important; }

    /* Toast notifications */
    #toast-container {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 9999;
    }
    .toast {
      padding: 10px 18px;
      border-radius: 6px;
      margin-bottom: 8px;
      font-size: 0.85rem;
      animation: toast-in 0.3s ease;
      max-width: 320px;
      backdrop-filter: blur(8px);
    }
    .toast-success { background: rgba(46, 204, 113, 0.85); color: #fff; }
    .toast-error { background: rgba(231, 76, 60, 0.85); color: #fff; }
    .toast-info { background: rgba(52, 152, 219, 0.85); color: #fff; }
    @keyframes toast-in {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Loading & error states */
    .battle-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-size: 1.2rem;
      color: rgba(160, 170, 195, 0.5);
    }
    .battle-error {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 16px;
      color: #e74c3c;
    }
    .battle-error button {
      padding: 8px 24px;
      border-radius: 6px;
      border: 1px solid rgba(80, 100, 140, 0.2);
      background: rgba(30, 40, 60, 0.6);
      color: #d8dce8;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .battle-error button:hover { background: rgba(40, 50, 80, 0.7); }

    /* Priority indicators (kept for compat) */
    .mtga-priority { display: none; }
    .mtga-phase-strip { display: none; }

    /* Empty zone */
    .mtga-zone-empty {
      color: rgba(160, 170, 195, 0.25);
      font-size: 0.7rem;
      padding: 12px;
      text-align: center;
      font-style: italic;
    }

    /* Drop target highlight */
    .mtga-zone.drop-target,
    .mtga-hand.drop-target,
    .mtga-zone-battlefield.drop-target {
      background: rgba(212, 160, 67, 0.06) !important;
      box-shadow: inset 0 0 20px rgba(212, 160, 67, 0.08);
    }

    /* Battlefield organized layout */
    .bf-layout {
      display: flex;
      flex-direction: column;
      height: 100%;
      padding: 4px 0;
      gap: 4px;
    }
    .bf-row {
      display: flex;
      flex-wrap: nowrap;
      gap: 0;
      align-items: flex-start;
      min-height: 40px;
      overflow: visible;
    }
    .bf-row .mtg-card-container {
      flex-shrink: 0;
    }
    .bf-row .mtg-card-container:not(:first-child) {
      margin-left: var(--compact-ml, 0px);
    }
    .bf-creatures {
      flex: 1;
      align-content: flex-start;
      justify-content: center;
      overflow: hidden;
    }
    .bf-bottom-row {
      display: flex;
      gap: 0;
      flex-shrink: 0;
      overflow: visible;
    }
    .bf-lands {
      flex: 0 0 50%;
      max-width: 50%;
      justify-content: flex-start;
      overflow: hidden;
    }
    .bf-others {
      flex: 0 0 50%;
      max-width: 50%;
      justify-content: flex-end;
      overflow: hidden;
    }
    .bf-empty {
      color: rgba(160, 170, 195, 0.15);
      font-size: 0.65rem;
      padding: 8px;
      text-align: center;
      font-style: italic;
      align-self: center;
    }

    /* Zone overlays (graveyard/exile compact badges) */
    .zone-overlays {
      position: absolute;
      top: 6px;
      right: 6px;
      display: flex;
      gap: 6px;
      z-index: 5;
    }
    .zone-overlays-opp {
      position: absolute;
      bottom: 6px;
      right: 6px;
      display: flex;
      gap: 6px;
      z-index: 5;
    }
    .zone-overlay {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: 4px;
      background: rgba(10, 14, 26, 0.7);
      border-radius: 6px;
      border: 1px solid rgba(80, 100, 140, 0.15);
      cursor: pointer;
      transition: all 0.2s;
      min-width: 64px;
    }
    .zone-overlay:hover {
      background: rgba(20, 28, 50, 0.85);
      border-color: rgba(212, 160, 67, 0.3);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
    }
    .zone-overlay.drop-target {
      background: rgba(212, 160, 67, 0.12);
      border-color: rgba(212, 160, 67, 0.6);
      box-shadow: 0 0 12px rgba(212, 160, 67, 0.25);
    }
    .zone-overlay-count {
      font-size: 0.7rem;
      font-weight: 700;
      color: rgba(200, 210, 230, 0.8);
      line-height: 1;
    }
    .zone-overlay-label {
      font-size: 0.55rem;
      color: rgba(160, 170, 195, 0.4);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 600;
    }

    /* Modal overlay */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(5, 8, 15, 0.85);
      z-index: 8000;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }
    .modal-overlay.hidden {
      display: none;
    }
    .modal-box {
      background: linear-gradient(180deg, #141c30, #0f1525);
      border: 1px solid rgba(80, 100, 140, 0.2);
      border-radius: 10px;
      min-width: 400px;
      max-width: 90vw;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid rgba(80, 100, 140, 0.15);
    }
    .modal-header h3 {
      color: rgba(220, 225, 240, 0.9);
      font-size: 1rem;
      font-weight: 600;
    }
    .modal-close {
      background: none;
      border: none;
      color: rgba(160, 170, 195, 0.5);
      font-size: 1.5rem;
      cursor: pointer;
      padding: 0 4px;
      line-height: 1;
    }
    .modal-close:hover {
      color: rgba(230, 235, 245, 0.9);
    }
    .modal-body {
      overflow-y: auto;
      max-height: 65vh;
    }
    .modal-overlay.modal-drag-active {
      background: rgba(212, 160, 67, 0.06);
      border: 2px dashed rgba(212, 160, 67, 0.25);
    }
    .modal-overlay.modal-drag-active .modal-box {
      opacity: 0.6;
    }

    /* Dragging card */
    .mtg-card.dragging {
      opacity: 0.4;
    }

    /* Right-click context menu */
    .ctx-menu {
      position: fixed;
      z-index: 9998;
      background: linear-gradient(180deg, #1a2240, #141c35);
      border: 1px solid rgba(80, 100, 140, 0.3);
      border-radius: 8px;
      padding: 4px 0;
      min-width: 180px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
      font-size: 0.82rem;
    }
    .ctx-menu-item {
      padding: 6px 14px;
      cursor: pointer;
      color: rgba(220, 225, 240, 0.85);
      transition: background 0.15s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .ctx-menu-item:hover {
      background: rgba(212, 160, 67, 0.1);
    }
    .ctx-menu-separator {
      height: 1px;
      background: rgba(80, 100, 140, 0.15);
      margin: 4px 0;
    }
    .ctx-menu-label {
      padding: 4px 14px;
      font-size: 0.65rem;
      color: rgba(160, 170, 195, 0.4);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 600;
    }
    .ctx-color-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      display: inline-block;
      flex-shrink: 0;
    }

    /* Counter badges on cards - glassmorphism */
    .card-counters {
      position: absolute;
      top: 4px;
      right: 4px;
      display: flex;
      flex-direction: column;
      gap: 3px;
      z-index: 3;
    }
    .counter-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 20px;
      height: 20px;
      border-radius: 6px;
      font-size: 0.58rem;
      font-weight: 800;
      line-height: 1;
      padding: 0 5px;
      letter-spacing: 0.02em;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.2);
      text-shadow: 0 1px 2px rgba(0,0,0,0.6);
      box-shadow: 0 2px 8px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.15);
    }
    .counter-plus {
      background: rgba(46, 204, 113, 0.55);
      color: #d0ffe8;
    }
    .counter-minus {
      background: rgba(231, 76, 60, 0.55);
      color: #ffd8d2;
    }
    .counter-W { background: rgba(249,250,244,0.5); color: #fff; border-color: rgba(255,255,255,0.35); }
    .counter-U { background: rgba(14,104,171,0.55); color: #c8e6ff; }
    .counter-B { background: rgba(45,40,32,0.65); color: #ddd; border-color: rgba(120,100,80,0.4); }
    .counter-R { background: rgba(211,32,42,0.55); color: #ffd0d0; }
    .counter-G { background: rgba(0,115,62,0.55); color: #c8ffd8; }

    /* Planeswalker loyalty - modern shield design */
    .loyalty-badge {
      position: absolute;
      bottom: 6px;
      right: 4px;
      display: flex;
      align-items: center;
      gap: 0;
      z-index: 3;
      background: rgba(20, 15, 40, 0.5);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 14px;
      border: 1px solid rgba(140, 100, 220, 0.3);
      box-shadow: 0 3px 12px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.08);
      padding: 2px;
    }
    .loyalty-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      border-radius: 10px;
      border: none;
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
      line-height: 1;
      padding: 0;
      transition: all 0.18s ease;
      color: rgba(255,255,255,0.8);
      background: transparent;
      text-shadow: none;
      box-shadow: none;
      pointer-events: auto;
      position: relative;
      z-index: 2;
    }
    .loyalty-btn:hover {
      background: rgba(255,255,255,0.12);
      color: #fff;
      transform: scale(1.1);
    }
    .loyalty-btn:active {
      transform: scale(0.95);
      background: rgba(255,255,255,0.18);
    }
    .loyalty-btn-plus { color: rgba(100, 230, 150, 0.9); }
    .loyalty-btn-plus:hover { color: #6eff9e; background: rgba(46,204,113,0.15); }
    .loyalty-btn-minus { color: rgba(240, 110, 100, 0.9); }
    .loyalty-btn-minus:hover { color: #ff7e72; background: rgba(231,76,60,0.15); }

    .loyalty-shield {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 30px;
      height: 30px;
      flex-shrink: 0;
      pointer-events: none;
    }
    .loyalty-shield svg {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }
    .loyalty-value {
      position: relative;
      z-index: 1;
      font-size: 0.72rem;
      font-weight: 800;
      color: #fff;
      text-shadow: 0 1px 3px rgba(0,0,0,0.5);
      line-height: 1;
    }

    /* Token card visual indicator */
    .mtg-token {
      border: 1.5px dashed rgba(160, 200, 160, 0.4) !important;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4), 0 0 8px rgba(100, 200, 100, 0.1) !important;
      aspect-ratio: 5 / 7;
    }
    .mtg-token:hover {
      border-color: rgba(160, 200, 160, 0.6) !important;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4), 0 0 12px rgba(100, 200, 100, 0.2) !important;
    }

    /* Damage marker */
    .mtga-card-damage {
      position: absolute;
      bottom: 4px;
      right: 4px;
      background: rgba(200, 30, 30, 0.85);
      color: #fff;
      font-size: 0.7rem;
      font-weight: 800;
      padding: 2px 6px;
      border-radius: 3px;
      text-shadow: 0 1px 2px rgba(0,0,0,0.5);
    }

    .bf-layout.opp-layout .bf-creatures {
      align-items: flex-end;
      justify-content: center;
    }
    .bf-layout.opp-layout .bf-bottom-row {
      align-items: flex-start;
    }

    /* ========== Toolbox (dice/coin) ========== */
    .toolbox-wrapper {
      position: relative;
      display: inline-flex;
      align-items: center;
      margin: 0 4px;
    }
    .toolbox-btn {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      border: 1px solid rgba(80, 100, 140, 0.2);
      background: rgba(30, 40, 65, 0.5);
      color: rgba(180, 190, 210, 0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      padding: 0;
    }
    .toolbox-btn:hover {
      background: rgba(40, 55, 90, 0.7);
      color: rgba(220, 225, 240, 0.9);
      border-color: rgba(100, 120, 180, 0.35);
    }
    .toolbox-popup {
      display: none;
      position: absolute;
      z-index: 9990;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(180deg, #1a2240, #141c35);
      border: 1px solid rgba(80, 100, 140, 0.3);
      border-radius: 8px;
      padding: 4px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
      min-width: 130px;
    }
    .toolbox-popup.open {
      display: block;
      animation: toolbox-in 0.18s ease;
    }
    @keyframes toolbox-in {
      from { opacity: 0; transform: translateX(-50%) translateY(6px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    .toolbox-option {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      border-radius: 5px;
      cursor: pointer;
      color: rgba(220, 225, 240, 0.85);
      font-size: 0.82rem;
      font-weight: 500;
      transition: background 0.15s;
    }
    .toolbox-option:hover {
      background: rgba(212, 160, 67, 0.12);
    }
    .toolbox-icon {
      font-size: 1rem;
      width: 20px;
      text-align: center;
      flex-shrink: 0;
    }

    /* Roll result badge in info bar */
    .roll-result-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 5px;
      background: rgba(40, 55, 90, 0.4);
      border: 1px solid rgba(80, 100, 140, 0.2);
      font-size: 0.78rem;
      animation: roll-badge-in 0.3s ease;
    }
    @keyframes roll-badge-in {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1); }
    }
    .roll-result-badge .roll-value {
      font-weight: 800;
      color: #d4a043;
      font-size: 0.85rem;
    }
    .roll-result-badge .roll-type {
      color: rgba(160, 170, 195, 0.6);
      font-size: 0.68rem;
    }
    .roll-result-badge .roll-by {
      color: rgba(160, 170, 195, 0.5);
      font-size: 0.65rem;
    }

    /* Roll animation overlay */
    #roll-anim-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(5, 8, 15, 0.7);
      z-index: 99999;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(3px);
      pointer-events: none;
    }
    .roll-anim-box {
      text-align: center;
      animation: roll-box-in 0.25s ease;
    }
    @keyframes roll-box-in {
      from { opacity: 0; transform: scale(0.6); }
      to { opacity: 1; transform: scale(1); }
    }
    .roll-anim-icon {
      font-size: 3rem;
      margin-bottom: 8px;
      animation: roll-icon-spin 0.6s ease;
    }
    @keyframes roll-icon-spin {
      0% { transform: rotate(0deg) scale(0.5); opacity: 0; }
      50% { transform: rotate(180deg) scale(1.2); }
      100% { transform: rotate(360deg) scale(1); }
    }
    .roll-anim-label {
      font-size: 0.9rem;
      color: rgba(180, 190, 210, 0.6);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: 600;
      margin-bottom: 12px;
    }
    .roll-anim-number {
      font-size: 4.5rem;
      font-weight: 900;
      color: #e8ecf5;
      text-shadow: 0 0 30px rgba(212, 160, 67, 0.4), 0 0 60px rgba(212, 160, 67, 0.2);
      line-height: 1;
      min-height: 5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.06s;
    }
    .roll-anim-number.roll-final {
      color: #d4a043;
      text-shadow: 0 0 40px rgba(212, 160, 67, 0.6), 0 0 80px rgba(212, 160, 67, 0.3);
      animation: roll-final-pulse 0.4s ease;
    }
    @keyframes roll-final-pulse {
      0% { transform: scale(1.4); }
      60% { transform: scale(0.95); }
      100% { transform: scale(1); }
    }
    .roll-anim-player {
      font-size: 0.8rem;
      color: rgba(160, 170, 195, 0.5);
      margin-top: 12px;
    }
    #roll-anim-overlay.roll-fadeout {
      animation: roll-fadeout 0.6s ease forwards;
    }
    @keyframes roll-fadeout {
      from { opacity: 1; }
      to { opacity: 0; visibility: hidden; }
    }

    /* Arena-style buttons */
    .mtga-action-bar .btn {
      border: none;
      border-radius: 4px;
      font-weight: 600;
      font-size: 0.82rem;
      padding: 6px 14px;
      transition: all 0.2s;
    }
    .mtga-action-bar .btn-primary {
      background: linear-gradient(180deg, #2ecc71, #27ae60);
      color: #fff;
    }
    .mtga-action-bar .btn-primary:hover {
      background: linear-gradient(180deg, #3ddb80, #2ecc71);
      box-shadow: 0 2px 8px rgba(46, 204, 113, 0.3);
    }
    .mtga-action-bar .btn-danger {
      background: rgba(180, 40, 40, 0.6);
      color: rgba(230, 180, 180, 0.8);
    }
    .mtga-action-bar .btn-danger:hover {
      background: rgba(200, 50, 50, 0.7);
      color: #fff;
    }
    .mtga-action-bar .btn-secondary {
      background: rgba(60, 70, 100, 0.4);
      color: rgba(180, 190, 210, 0.7);
    }
    .mtga-action-bar .btn-secondary:hover {
      background: rgba(80, 90, 120, 0.5);
      color: rgba(220, 225, 240, 0.9);
    }
    .mtga-action-bar .btn-sm {
      padding: 4px 10px;
      font-size: 0.78rem;
    }

  </style>
</head>
<body>
  <div id="battle-root">
    <div class="battle-loading" id="battle-loading">对战加载中...</div>
  </div>
  <div id="toast-container"></div>

  <!-- Modal overlay for zone popups -->
  <div id="modal-overlay" class="modal-overlay hidden" onclick="if(event.target===this)closeModal()">
    <div class="modal-box">
      <div class="modal-header">
        <h3 id="modal-title">Modal</h3>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
  <script>
    // ========== Battle Page Init ==========
    const params = new URLSearchParams(window.location.search);
    const battleId = parseInt(params.get('id'));
    const token = localStorage.getItem('mtg_token');

    if (!battleId) {
      document.getElementById('battle-loading').innerHTML = '<div class="battle-error"><div>缺少对战ID</div><button onclick="window.close()">关闭</button></div>';
    } else if (!token) {
      document.getElementById('battle-loading').innerHTML = '<div class="battle-error"><div>未登录</div><button onclick="window.location.href=\'/\'">返回首页</button></div>';
    } else {
      // Set global state for battle mode
      state.token = token;
      state.battleId = battleId;
      state.myKey = null;
      state.oppKey = null;
      state.currentPage = 'battle-detail';
      state.pageData = { id: battleId };
      currentBattleId = battleId;
      battleLocalUI.battleId = battleId;

      initBattle();
    }

    async function initBattle() {
      try {
        // Get current user
        const me = await api('/api/me');
        state.user = me;

        // Get battle details
        const battle = await api(`/api/battles/${battleId}`);
        if (battle.status === 'waiting') {
          // Battle hasn't started yet - show waiting/join UI
          renderWaitingScreen(battle);
          return;
        }
        if (battle.status !== 'in_progress' && battle.status !== 'completed') {
          document.getElementById('battle-loading').innerHTML = `<div class="battle-error"><div>对战状态: ${battle.status}</div><button onclick="window.close()">关闭</button></div>`;
          return;
        }

        // Determine player keys
        state.myKey = String(battle.player1_id) === String(state.user.id) ? 'p1' : 'p2';
        state.oppKey = state.myKey === 'p1' ? 'p2' : 'p1';
        battleLocalUI.myKey = state.myKey;
        battleLocalUI.oppKey = state.oppKey;

        // Render the battle board
        renderBattlePage(battle);

        // Subscribe to WS updates
        API.token = state.token;
        WS.connect();
        WS.subscribe('battle:' + battleId);
        WS.on('battle_updated', handleBattleUpdate);
      } catch (err) {
        console.error('initBattle error:', err);
        var loadingEl = document.getElementById('battle-loading');
        if (loadingEl) {
          loadingEl.innerHTML = '<div class="battle-error"><div>' + escapeHtml(err.message) + '</div><button onclick="window.close()">关闭</button></div>';
        } else {
          // battle-loading was removed (renderBattlePage/renderWaitingScreen already ran)
          // Show error as a toast overlay
          var root = document.getElementById('battle-root');
          if (root) {
            var errDiv = document.createElement('div');
            errDiv.className = 'battle-error';
            errDiv.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:9999';
            errDiv.innerHTML = '<div style="color:#ff6b6b">' + escapeHtml(err.message) + '</div><button onclick="window.close()" style="margin-top:8px">关闭</button>';
            root.appendChild(errDiv);
          }
        }
      }
    }

    function renderWaitingScreen(battle) {
      const root = document.getElementById('battle-root');
      const isOwner = String(battle.player1_id) === String(state.user.id);
      const hasP2 = !!battle.player2_id;

      root.innerHTML = `
        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:16px">
          <h2>${escapeHtml(battle.name || '对战 #' + battleId)}</h2>
          <div>创建者: ${escapeHtml(battle.player1_name || '玩家1')}</div>
          ${hasP2 ? `<div>对手: ${escapeHtml(battle.player2_name || '玩家2')}</div>` : '<div style="color:var(--text-muted)">等待对手加入...</div>'}
          ${!hasP2 && !isOwner ? `<button class="btn btn-primary" onclick="joinThisBattle()">加入对战</button>` : ''}
          ${hasP2 && isOwner && battle.status === 'waiting' ? `<button class="btn btn-primary" onclick="startThisBattle()">开始对战</button>` : ''}
          <button class="btn btn-secondary" onclick="window.close()">返回</button>
        </div>
      `;
    }

    async function joinThisBattle() {
      try {
        const decks = await api('/api/decks');
        if (decks.length === 0) { showToast('请先创建一个牌组', 'error'); return; }
        showModal('加入对战', `
          <form onsubmit="handleJoin(event)">
            <div class="form-group">
              <label>选择牌组</label>
              <select id="join-deck-select" required>
                ${decks.map(d => `<option value="${d.id}">${escapeHtml(d.name)} (${Array.isArray(d.main_deck) ? d.main_deck.length : 0}张)</option>`).join('')}
              </select>
            </div>
            <button type="submit" class="btn btn-primary btn-block">加入</button>
          </form>
        `);
      } catch (err) { showToast(err.message, 'error'); }
    }

    async function handleJoin(e) {
      e.preventDefault();
      const deck_id = parseInt(document.getElementById('join-deck-select').value);
      try {
        await api(`/api/battles/${battleId}/join`, { method: 'POST', body: JSON.stringify({ deck_id }) });
        closeModal();
        showToast('已加入对战');
        setTimeout(() => location.reload(), 1000);
      } catch (err) { showToast(err.message, 'error'); }
    }

    async function startThisBattle() {
      if (!confirm('确定要开始对战吗？')) return;
      try {
        await api(`/api/battles/${battleId}/start`, { method: 'POST' });
        location.reload();
      } catch (err) { showToast(err.message, 'error'); }
    }

    function renderBattlePage(battle) {
      // Store metadata for immediate re-render in mtgaAction
      battleLocalUI.p1Id = battle.player1_id;
      battleLocalUI.p2Id = battle.player2_id;
      battleLocalUI.battleName = battle.name || ('Battle #' + battleId);

      const root = document.getElementById('battle-root');
      root.innerHTML = '<div id="content"></div>';
      const contentEl = document.getElementById('content');
      renderBattleBoard(contentEl, battle, battleId, state.myKey, state.oppKey);

      // Listen for window resize/zoom to recalculate battlefield spacing
      window.addEventListener('resize', onBattlefieldResize);
    }

    async function handleBattleUpdate(data) {
      if (!data || data.battleId !== battleId) return;
      // Skip if mtgaAction is currently processing (it handles its own re-render)
      if (typeof _battleRefreshing !== 'undefined' && _battleRefreshing) return;
      try {
        const battle = await api(`/api/battles/${battleId}`);
        const contentEl = document.getElementById('content');
        if (!contentEl) return;
        renderBattleBoard(contentEl, battle, battleId, state.myKey, state.oppKey);
      } catch (err) {
        console.error('Battle update error:', err);
      }
    }

    // ========== Leave battle (override app.js version for battle.html context) ==========
    function mtgaLeaveBattle(id) {
      if (WS) {
        WS.unsubscribe('battle:' + id);
        WS.disconnect();
      }
      window.close();
      // Fallback: if window.close() doesn't work (not opened by script)
      setTimeout(() => { window.location.href = '/'; }, 500);
    }
    async function mtgaReturnToEvent(battleId) {
      try {
        var battle = await api('/api/battles/' + battleId);
        var eventId = battle.event_id;
        if (WS) {
          WS.unsubscribe('battle:' + battleId);
          WS.disconnect();
        }
        if (eventId) {
          window.location.href = '/events/' + eventId;
        } else {
          mtgaLeaveBattle(battleId);
        }
      } catch(err) {
        mtgaLeaveBattle(battleId);
      }
    }
  </script>
</body>
</html>
