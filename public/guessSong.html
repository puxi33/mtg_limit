<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>歌曲猜猜看 - 曲库选择</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: linear-gradient(135deg, #0a0e1a 0%, #1a1040 50%, #0d1530 100%);
  color: #e0e0e0;
  min-height: 100vh;
  padding: 24px;
}
.header {
  text-align: center;
  margin-bottom: 40px;
  padding-top: 40px;
}
.header h1 {
  font-size: 2rem;
  font-weight: 800;
  background: linear-gradient(90deg, #a78bfa, #60a5fa, #34d399);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 8px;
}
.header p {
  color: rgba(160,170,200,0.5);
  font-size: 0.9rem;
}
.toolbar {
  display: flex;
  justify-content: center;
  gap: 12px;
  margin-bottom: 32px;
}
.toolbar a {
  color: #a78bfa;
  text-decoration: none;
  font-size: 0.85rem;
  padding: 6px 16px;
  border: 1px solid rgba(167,139,250,0.3);
  border-radius: 8px;
  transition: all 0.2s;
}
.toolbar a:hover {
  background: rgba(167,139,250,0.12);
}
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px;
  max-width: 960px;
  margin: 0 auto;
}
.playlist-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px;
  padding: 24px;
  cursor: pointer;
  transition: all 0.25s;
  text-decoration: none;
  color: inherit;
  display: block;
}
.playlist-card:hover {
  transform: translateY(-4px);
  border-color: rgba(167,139,250,0.3);
  box-shadow: 0 8px 32px rgba(99,102,241,0.15);
  background: rgba(255,255,255,0.06);
}
.playlist-cover {
  width: 100%;
  aspect-ratio: 1;
  border-radius: 12px;
  background: linear-gradient(135deg, #1e1b4b, #312e81);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 3rem;
  margin-bottom: 16px;
  overflow: hidden;
}
.playlist-cover img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.playlist-name {
  font-size: 1.15rem;
  font-weight: 700;
  margin-bottom: 6px;
}
.playlist-desc {
  font-size: 0.8rem;
  color: rgba(160,170,200,0.5);
  margin-bottom: 10px;
  line-height: 1.4;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.playlist-count {
  font-size: 0.75rem;
  color: #a78bfa;
  font-weight: 600;
}
.empty-state {
  text-align: center;
  padding: 80px 20px;
  color: rgba(160,170,200,0.4);
}
.empty-state p { margin-bottom: 16px; }
.loading {
  text-align: center;
  padding: 80px 20px;
  color: rgba(160,170,200,0.4);
}
.spinner {
  display: inline-block;
  width: 32px; height: 32px;
  border: 3px solid rgba(167,139,250,0.2);
  border-top-color: #a78bfa;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-bottom: 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="header">
  <h1>🎵 歌曲猜猜看</h1>
  <p>选择曲库，开始挑战</p>
</div>
<div class="toolbar">
  <a href="/guessSong/manage">📁 曲库管理</a>
</div>
<div id="content">
  <div class="loading">
    <div class="spinner"></div>
    <div>加载曲库列表...</div>
  </div>
</div>

<script>
fetch('/api/guessSong/playlists')
  .then(r => r.json())
  .then(playlists => {
    var el = document.getElementById('content');
    if (!playlists.length) {
      el.innerHTML = '<div class="empty-state"><p>还没有曲库</p><a href="/guessSong/manage" style="color:#a78bfa">去创建一个 →</a></div>';
      return;
    }
    var emojis = ['🎵','🎶','🎤','🎸','🎹','🎺','🥁','🎻','🎼','🎧'];
    var html = '<div class="grid">';
    playlists.forEach(function(pl, i) {
      var emoji = emojis[i % emojis.length];
      var coverHtml = pl.cover
        ? '<img src="' + pl.cover + '" alt="">'
        : emoji;
      html += '<a class="playlist-card" href="/guessSong/play/' + pl.id + '">'
        + '<div class="playlist-cover">' + coverHtml + '</div>'
        + '<div class="playlist-name">' + escHtml(pl.name) + '</div>'
        + '<div class="playlist-desc">' + escHtml(pl.description) + '</div>'
        + '<div class="playlist-count">' + pl.songCount + ' 首歌曲</div>'
        + '</a>';
    });
    html += '</div>';
    el.innerHTML = html;
  })
  .catch(function(e) {
    document.getElementById('content').innerHTML = '<div class="empty-state"><p>加载失败</p></div>';
  });

function escHtml(s) {
  var d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}
</script>
</body>
</html>
