<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MTG 限制赛 - 万智牌轮抓/现开/对战</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="app">
    <nav id="navbar" class="navbar hidden">
      <div class="nav-brand" onclick="navigate('dashboard')">MTG 限制赛</div>
      <button class="nav-toggle" onclick="toggleNavMenu()" aria-label="菜单">
        <span></span><span></span><span></span>
      </button>
      <div class="nav-links">
        <a onclick="navigate('dashboard')" data-page="dashboard">首页</a>
        <a onclick="navigate('cubes')" data-page="cubes">Cube管理</a>
        <a onclick="navigate('events')" data-page="events">限制赛</a>
        <a onclick="navigate('decks')" data-page="decks">牌组</a>
        <a onclick="navigate('battles')" data-page="battles">对战大厅</a>
      </div>
      <div class="nav-user">
        <span id="nav-username"></span>
        <div class="nav-dropdown">
          <a onclick="navigate('profile')">个人资料</a>
          <a onclick="logout()">退出登录</a>
        </div>
      </div>
    </nav>

    <main id="content"></main>

    <div id="modal-overlay" class="modal-overlay hidden" onclick="closeModal()">
      <div class="modal-content" onclick="event.stopPropagation()">
        <div class="modal-header">
          <h3 id="modal-title"></h3>
          <button class="modal-close" onclick="closeModal()">&times;</button>
        </div>
        <div id="modal-body" class="modal-body"></div>
      </div>
    </div>

    <div id="toast-container" class="toast-container"></div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
