<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>歌曲猜猜看</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: linear-gradient(135deg, #0a0e1a 0%, #1a1040 50%, #0d1530 100%);
  color: #e0e0e0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.container { max-width: 520px; width: 100%; }
.top-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
}
.back-link {
  color: rgba(160,170,200,0.5);
  text-decoration: none;
  font-size: 0.85rem;
  transition: color 0.2s;
}
.back-link:hover { color: #a78bfa; }
.playlist-tag {
  font-size: 0.75rem;
  background: rgba(167,139,250,0.15);
  color: #a78bfa;
  padding: 4px 10px;
  border-radius: 6px;
  font-weight: 600;
}
h1 {
  text-align: center;
  font-size: 1.6rem;
  font-weight: 700;
  margin-bottom: 8px;
  background: linear-gradient(90deg, #a78bfa, #60a5fa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.subtitle {
  text-align: center;
  font-size: 0.85rem;
  color: rgba(160,170,200,0.6);
  margin-bottom: 32px;
}
.card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px;
  padding: 32px 28px;
  backdrop-filter: blur(10px);
}
.progress-wrap { margin-bottom: 28px; }
.progress-bar-bg {
  width: 100%; height: 6px;
  background: rgba(255,255,255,0.08);
  border-radius: 3px; overflow: hidden; cursor: pointer;
}
.progress-bar-fill {
  height: 100%; width: 0%;
  background: linear-gradient(90deg, #a78bfa, #60a5fa);
  border-radius: 3px; transition: width 0.3s linear;
}
.progress-info {
  display: flex; justify-content: space-between;
  margin-top: 8px; font-size: 0.75rem; color: rgba(160,170,200,0.5);
}
.btn-row { display: flex; gap: 12px; justify-content: center; margin-bottom: 24px; }
.btn {
  padding: 12px 28px; border: none; border-radius: 10px;
  font-size: 0.95rem; font-weight: 600; cursor: pointer;
  transition: all 0.2s; outline: none;
}
.btn:disabled { opacity: 0.35; cursor: not-allowed; }
.btn-play { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff; flex: 1; }
.btn-play:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(99,102,241,0.4); }
.btn-play.playing { background: linear-gradient(135deg, #ef4444, #f97316); }
.btn-reveal { background: linear-gradient(135deg, #f59e0b, #f97316); color: #fff; flex: 1; }
.btn-reveal:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(245,158,11,0.4); }
.btn-next {
  background: rgba(255,255,255,0.08); color: #a78bfa;
  border: 1px solid rgba(167,139,250,0.3);
  width: 100%; padding: 14px; font-size: 1rem;
}
.btn-next:hover:not(:disabled) { background: rgba(167,139,250,0.12); }
.reveal-card {
  display: none;
  background: rgba(167,139,250,0.08);
  border: 1px solid rgba(167,139,250,0.2);
  border-radius: 12px; padding: 20px 24px; margin-bottom: 20px;
  animation: fadeInUp 0.4s ease;
}
.reveal-card.show { display: block; }
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
.reveal-item { margin-bottom: 10px; }
.reveal-item:last-child { margin-bottom: 0; }
.reveal-label {
  font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px;
  color: rgba(167,139,250,0.6); margin-bottom: 2px;
}
.reveal-value { font-size: 1.1rem; font-weight: 600; color: #e8e0ff; }
.reveal-value.song-name {
  font-size: 1.3rem;
  background: linear-gradient(90deg, #a78bfa, #60a5fa);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.loading { text-align: center; padding: 40px 0; color: rgba(160,170,200,0.5); }
.spinner {
  display: inline-block; width: 28px; height: 28px;
  border: 3px solid rgba(167,139,250,0.2); border-top-color: #a78bfa;
  border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.status-text {
  text-align: center; font-size: 0.8rem;
  color: rgba(160,170,200,0.4); margin-top: 16px; min-height: 20px;
}
.score-bar {
  display: flex; justify-content: center; gap: 24px;
  margin-bottom: 24px; font-size: 0.8rem; color: rgba(160,170,200,0.5);
}
.score-bar span { color: #a78bfa; font-weight: 600; }
.visualizer {
  display: flex; align-items: flex-end; justify-content: center;
  gap: 3px; height: 40px; margin-bottom: 20px;
  opacity: 0.3; transition: opacity 0.3s;
}
.visualizer.active { opacity: 1; }
.viz-bar {
  width: 4px;
  background: linear-gradient(to top, #6366f1, #a78bfa);
  border-radius: 2px; transition: height 0.15s ease; height: 4px;
}
</style>
</head>
<body>
<div class="container">
  <div class="top-bar">
    <a class="back-link" href="/guessSong">← 返回曲库</a>
    <span class="playlist-tag" id="playlistTag"></span>
  </div>
  <h1>🎵 歌曲猜猜看</h1>
  <p class="subtitle">听前奏 30 秒，猜猜这首歌的出处？</p>

  <div class="score-bar">
    已听 <span id="totalCount">0</span> 首 &nbsp;|&nbsp; 猜对 <span id="guessCount">0</span> 首
  </div>

  <div class="card">
    <div id="loadingArea" class="loading" style="display:none">
      <div class="spinner"></div>
      <div>正在准备歌曲...</div>
    </div>

    <div id="quizArea" style="display:none">
      <div class="visualizer" id="visualizer">
        <div class="viz-bar"></div><div class="viz-bar"></div><div class="viz-bar"></div>
        <div class="viz-bar"></div><div class="viz-bar"></div><div class="viz-bar"></div>
        <div class="viz-bar"></div><div class="viz-bar"></div><div class="viz-bar"></div>
        <div class="viz-bar"></div><div class="viz-bar"></div><div class="viz-bar"></div>
        <div class="viz-bar"></div><div class="viz-bar"></div><div class="viz-bar"></div>
      </div>

      <div class="progress-wrap">
        <div class="progress-bar-bg" id="progressBg">
          <div class="progress-bar-fill" id="progressFill"></div>
        </div>
        <div class="progress-info">
          <span id="currentTime">0:00</span>
          <span id="totalTime">0:30</span>
        </div>
      </div>

      <div class="btn-row">
        <button class="btn btn-play" id="btnPlay" onclick="togglePlay()">▶ 播放</button>
        <button class="btn btn-reveal" id="btnReveal" onclick="revealAnswer()" disabled>揭晓答案</button>
      </div>

      <div class="reveal-card" id="revealCard">
        <div class="reveal-item">
          <div class="reveal-label">歌名</div>
          <div class="reveal-value song-name" id="rvName"></div>
        </div>
        <div class="reveal-item">
          <div class="reveal-label">出处</div>
          <div class="reveal-value" id="rvAnime"></div>
        </div>
        <div class="reveal-item">
          <div class="reveal-label">歌手</div>
          <div class="reveal-value" id="rvArtist"></div>
        </div>
        <div class="reveal-item">
          <div class="reveal-label">年份</div>
          <div class="reveal-value" id="rvYear"></div>
        </div>
      </div>

      <button class="btn btn-next" id="btnNext" onclick="loadNextSong()">下一首 →</button>
    </div>

    <div id="startArea" style="text-align:center; padding: 20px 0;">
      <button class="btn btn-play" onclick="loadNextSong()" style="padding: 16px 48px; font-size: 1.1rem;">
        🎵 开始挑战
      </button>
    </div>
  </div>

  <div class="status-text" id="statusText"></div>
</div>

<audio id="audioEl" preload="auto"></audio>

<script>
// Extract playlist ID from URL: /guessSong/play/:id
var playlistId = window.location.pathname.split('/').pop();
document.getElementById('playlistTag').textContent = '加载中...';

// Load playlist name
fetch('/api/guessSong/playlists')
  .then(function(r) { return r.json(); })
  .then(function(pls) {
    var pl = pls.find(function(p) { return p.id === playlistId; });
    document.getElementById('playlistTag').textContent = pl ? pl.name : playlistId;
  })
  .catch(function() { document.getElementById('playlistTag').textContent = playlistId; });

var audio = document.getElementById('audioEl');
var currentToken = null;
var isPlaying = false;
var timerInterval = null;
var vizInterval = null;
var playStartTime = 0;
var totalPlayed = 0;
var LIMIT = 30;
var totalCount = 0;
var guessCount = 0;

function formatTime(s) {
  var m = Math.floor(s / 60);
  var sec = Math.floor(s % 60);
  return m + ':' + (sec < 10 ? '0' : '') + sec;
}

function updateProgress() {
  var elapsed = totalPlayed;
  if (isPlaying) elapsed += (Date.now() - playStartTime) / 1000;
  var pct = Math.min(elapsed / LIMIT * 100, 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('currentTime').textContent = formatTime(Math.min(elapsed, LIMIT));
}

function startViz() {
  var bars = document.querySelectorAll('.viz-bar');
  document.getElementById('visualizer').classList.add('active');
  vizInterval = setInterval(function() {
    bars.forEach(function(b) { b.style.height = (4 + Math.random() * 32) + 'px'; });
  }, 150);
}

function stopViz() {
  document.getElementById('visualizer').classList.remove('active');
  if (vizInterval) { clearInterval(vizInterval); vizInterval = null; }
  document.querySelectorAll('.viz-bar').forEach(function(b) { b.style.height = '4px'; });
}

function stopPlayback() {
  if (isPlaying) { totalPlayed += (Date.now() - playStartTime) / 1000; isPlaying = false; }
  audio.pause();
  stopViz();
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  updateProgress();
  var btn = document.getElementById('btnPlay');
  btn.textContent = '▶ 播放';
  btn.classList.remove('playing');
}

function togglePlay() {
  if (totalPlayed >= LIMIT) {
    totalPlayed = 0;
    audio.currentTime = 0;
    document.getElementById('btnReveal').disabled = false;
  }
  if (isPlaying) {
    stopPlayback();
  } else {
    audio.play().then(function() {
      isPlaying = true;
      playStartTime = Date.now();
      var btn = document.getElementById('btnPlay');
      btn.textContent = '⏸ 暂停';
      btn.classList.add('playing');
      startViz();
      timerInterval = setInterval(function() {
        var elapsed = totalPlayed + (Date.now() - playStartTime) / 1000;
        updateProgress();
        if (elapsed >= LIMIT) {
          stopPlayback();
          totalPlayed = LIMIT;
          updateProgress();
          document.getElementById('btnPlay').textContent = '▶ 重听';
        }
      }, 200);
    }).catch(function(e) { setStatus('播放失败: ' + e.message); });
  }
}

function revealAnswer() {
  if (!currentToken) return;
  document.getElementById('btnReveal').disabled = true;
  fetch('/api/guessSong/reveal?token=' + encodeURIComponent(currentToken))
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.error) { setStatus(data.error); return; }
      document.getElementById('rvName').textContent = data.name;
      document.getElementById('rvAnime').textContent = data.anime;
      document.getElementById('rvArtist').textContent = data.artist;
      document.getElementById('rvYear').textContent = data.year || '';
      document.getElementById('revealCard').classList.add('show');
      totalCount++;
      document.getElementById('totalCount').textContent = totalCount;
    })
    .catch(function() { setStatus('获取信息失败'); });
}

function loadNextSong() {
  stopPlayback();
  totalPlayed = 0;
  currentToken = null;
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('currentTime').textContent = '0:00';
  document.getElementById('revealCard').classList.remove('show');
  document.getElementById('btnReveal').disabled = true;
  document.getElementById('btnPlay').disabled = true;
  document.getElementById('btnNext').disabled = true;
  document.getElementById('btnPlay').textContent = '▶ 播放';
  document.getElementById('btnPlay').classList.remove('playing');

  document.getElementById('startArea').style.display = 'none';
  document.getElementById('loadingArea').style.display = 'block';
  document.getElementById('quizArea').style.display = 'none';
  setStatus('');

  fetch('/api/guessSong/random?playlist=' + encodeURIComponent(playlistId))
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.error) {
        setStatus('错误: ' + data.error);
        document.getElementById('loadingArea').style.display = 'none';
        document.getElementById('startArea').style.display = 'block';
        return;
      }
      currentToken = data.token;
      audio.src = data.audioUrl;
      audio.load();
      document.getElementById('loadingArea').style.display = 'none';
      document.getElementById('quizArea').style.display = 'block';
      document.getElementById('btnPlay').disabled = false;
      document.getElementById('btnReveal').disabled = false;
      document.getElementById('btnNext').disabled = false;
      updateProgress();
    })
    .catch(function(e) {
      setStatus('加载失败: ' + e.message);
      document.getElementById('loadingArea').style.display = 'none';
      document.getElementById('startArea').style.display = 'block';
    });
}

function setStatus(msg) {
  document.getElementById('statusText').textContent = msg;
}

document.getElementById('progressBg').addEventListener('click', function(e) {
  if (!audio.src || !audio.duration) return;
  var rect = this.getBoundingClientRect();
  var pct = (e.clientX - rect.left) / rect.width;
  audio.currentTime = pct * LIMIT;
  totalPlayed = 0;
  playStartTime = Date.now();
  updateProgress();
});

document.addEventListener('keydown', function(e) {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
  else if (e.code === 'KeyR') { revealAnswer(); }
  else if (e.code === 'KeyN') { loadNextSong(); }
});
</script>
</body>
</html>
