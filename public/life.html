<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>生活待办</title>
  <style>
    :root {
      --bg: #fef6f9;
      --bg-card: #ffffff;
      --bg-hover: #fff0f5;
      --bg-input: #fef9fb;
      --primary: #ff85a2;
      --primary-light: #ffc2d1;
      --primary-dark: #e8668a;
      --accent: #b8a9f0;
      --accent-light: #ddd6fb;
      --mint: #7dd3b5;
      --mint-light: #c8f0e2;
      --peach: #ffb88c;
      --peach-light: #ffe0cc;
      --sky: #87ceeb;
      --sky-light: #d4f1f9;
      --text: #5a4a5a;
      --text-bright: #3d2c3d;
      --text-muted: #a898a8;
      --text-light: #c8b8c8;
      --border: #f0e0ea;
      --border-light: #f8f0f4;
      --danger: #ff6b8a;
      --danger-light: #ffe0e8;
      --shadow: 0 2px 12px rgba(255, 133, 162, 0.1);
      --shadow-hover: 0 4px 20px rgba(255, 133, 162, 0.18);
      --radius: 16px;
      --radius-sm: 10px;
      --radius-xs: 6px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(255,133,162,0.05) 0%, transparent 50%),
        radial-gradient(circle at 90% 80%, rgba(184,169,240,0.05) 0%, transparent 50%),
        radial-gradient(circle at 50% 50%, rgba(125,211,181,0.03) 0%, transparent 50%);
    }

    /* Nav */
    .life-nav {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .life-nav-brand {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--primary);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .life-nav-links {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .nav-user-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: linear-gradient(135deg, var(--primary-light), var(--accent-light));
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 0.85rem;
      color: var(--text-bright);
      font-weight: 500;
    }
    .nav-user-avatar {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--primary);
      color: white;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: 700;
    }
    .nav-link-btn {
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 0.82rem;
      cursor: pointer;
      border: 1.5px solid var(--border);
      background: white;
      color: var(--text-muted);
      text-decoration: none;
      transition: all 0.2s;
    }
    .nav-link-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: var(--bg-hover);
    }
    .nav-logout-btn {
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 0.82rem;
      cursor: pointer;
      border: 1.5px solid var(--danger-light);
      background: white;
      color: var(--text-muted);
      transition: all 0.2s;
    }
    .nav-logout-btn:hover {
      background: var(--danger);
      color: white;
      border-color: var(--danger);
    }

    /* Container */
    .life-container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 20px;
    }

    /* Header */
    .life-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .life-header h2 {
      font-size: 1.5rem;
      color: var(--text-bright);
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Filter */
    .filter-bar {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .filter-btn {
      padding: 6px 16px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: white;
      color: var(--text-muted);
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.25s;
      white-space: nowrap;
      font-weight: 500;
    }
    .filter-btn:hover {
      border-color: var(--primary-light);
      color: var(--primary);
      background: var(--bg-hover);
    }
    .filter-btn.active {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      border-color: transparent;
      box-shadow: 0 2px 8px rgba(255,133,162,0.3);
    }

    /* Buttons */
    .btn {
      padding: 8px 18px;
      border-radius: 20px;
      border: none;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      box-shadow: 0 2px 8px rgba(255,133,162,0.3);
    }
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(255,133,162,0.4);
    }
    .btn-secondary {
      background: white;
      color: var(--text);
      border: 1.5px solid var(--border);
    }
    .btn-secondary:hover {
      border-color: var(--primary-light);
      color: var(--primary);
    }
    .btn-danger {
      background: white;
      color: var(--danger);
      border: 1.5px solid var(--danger-light);
    }
    .btn-danger:hover {
      background: var(--danger);
      color: white;
      border-color: var(--danger);
    }
    .btn-sm {
      padding: 4px 12px;
      font-size: 0.78rem;
    }
    .btn-block {
      width: 100%;
      justify-content: center;
      padding: 12px;
    }
    .btn-mint {
      background: linear-gradient(135deg, var(--mint), #5cc09e);
      color: white;
      box-shadow: 0 2px 8px rgba(125,211,181,0.3);
    }
    .btn-mint:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(125,211,181,0.4);
    }

    /* Project Grid */
    .project-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 18px;
    }

    /* Project Card */
    .project-card {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 20px;
      border: 1.5px solid var(--border-light);
      box-shadow: var(--shadow);
      transition: all 0.25s;
      cursor: pointer;
    }
    .project-card:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-2px);
      border-color: var(--primary-light);
    }
    .project-card[draggable="true"] {
      cursor: grab;
    }
    .project-card.dragging {
      opacity: 0.4;
      transform: scale(0.97);
    }
    .project-card.drag-over {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(255,133,162,0.2);
    }
    .project-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 10px;
    }
    .project-card-header h3 {
      font-size: 1.05rem;
      color: var(--text-bright);
      font-weight: 600;
    }

    /* Badges */
    .badge {
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 0.72rem;
      font-weight: 600;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .badge-waiting {
      background: var(--peach-light);
      color: #b87a4a;
    }
    .badge-progress {
      background: var(--sky-light);
      color: #4a8db8;
    }
    .badge-completed {
      background: var(--mint-light);
      color: #3a8a6a;
    }

    /* Progress */
    .progress-bar {
      height: 8px;
      background: var(--border-light);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary-light), var(--primary));
      border-radius: 4px;
      transition: width 0.4s ease;
    }
    .progress-fill.complete {
      background: linear-gradient(90deg, var(--mint-light), var(--mint));
    }

    /* Step preview */
    .step-preview {
      background: var(--bg-input);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      margin-top: 8px;
    }
    .step-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 3px 0;
      font-size: 0.82rem;
    }
    .step-icon {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      flex-shrink: 0;
    }
    .step-icon.completed { background: var(--mint-light); color: var(--mint); }
    .step-icon.pending { background: var(--border-light); color: var(--text-light); }
    .step-icon.partial { background: var(--peach-light); color: var(--peach); }

    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(90, 74, 90, 0.35);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal-overlay.hidden { display: none; }
    .modal-content {
      background: white;
      border-radius: var(--radius);
      width: 90%;
      max-width: 560px;
      max-height: 85vh;
      overflow-y: auto;
      box-shadow: 0 8px 40px rgba(255,133,162,0.15);
    }
    .modal-header {
      padding: 18px 20px 12px;
      border-bottom: 1px solid var(--border-light);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .modal-header h3 {
      font-size: 1.1rem;
      color: var(--text-bright);
      font-weight: 700;
    }
    .modal-close {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: none;
      background: var(--bg-hover);
      color: var(--text-muted);
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal-close:hover { background: var(--danger-light); color: var(--danger); }
    .modal-body { padding: 16px 20px 20px; }

    /* Forms */
    .form-group {
      margin-bottom: 14px;
    }
    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.85rem;
      color: var(--text);
      font-weight: 600;
    }
    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 0.9rem;
      background: var(--bg-input);
      color: var(--text);
      transition: border-color 0.2s;
      outline: none;
      font-family: inherit;
    }
    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(255,133,162,0.1);
    }

    /* Toast */
    .toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 2000;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .toast {
      padding: 10px 18px;
      border-radius: var(--radius-sm);
      font-size: 0.88rem;
      font-weight: 500;
      animation: slideIn 0.3s ease;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    }
    .toast-success {
      background: linear-gradient(135deg, var(--mint-light), #e8faf2);
      color: #2a7a5a;
      border: 1px solid var(--mint);
    }
    .toast-error {
      background: linear-gradient(135deg, var(--danger-light), #fff0f4);
      color: #c44a6a;
      border: 1px solid var(--danger);
    }
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    /* ========== DETAIL PAGE ========== */
    .detail-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .detail-header h2 {
      font-size: 1.4rem;
      color: var(--text-bright);
      font-weight: 700;
    }
    .detail-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .detail-progress-card {
      background: white;
      border-radius: var(--radius);
      padding: 18px;
      border: 1.5px solid var(--border-light);
      box-shadow: var(--shadow);
      margin-bottom: 20px;
    }
    .detail-progress-stats {
      display: flex;
      gap: 20px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .detail-progress-value {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--primary);
    }
    .detail-progress-count {
      font-size: 0.82rem;
      color: var(--text-muted);
    }

    /* Tree */
    .step-tree {
      background: white;
      border-radius: var(--radius);
      padding: 18px;
      border: 1.5px solid var(--border-light);
      box-shadow: var(--shadow);
    }
    .step-tree-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .step-tree-header h3 {
      font-size: 1.05rem;
      color: var(--text-bright);
      font-weight: 700;
    }
    .step-tree-node {
      position: relative;
    }
    .step-tree-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      transition: background 0.15s;
    }
    .step-tree-row:hover {
      background: var(--bg-hover);
    }
    .step-tree-content {
      flex: 1;
      min-width: 0;
    }
    .step-tree-name {
      font-size: 0.92rem;
      font-weight: 500;
      color: var(--text-bright);
    }
    .step-tree-name.completed {
      text-decoration: line-through;
      color: var(--text-muted);
    }
    .step-tree-remark {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .step-tree-actions {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }
    .step-tree-children {
      margin-left: 24px;
      border-left: 2px dashed var(--primary-light);
      padding-left: 12px;
    }

    /* Complete button */
    .complete-btn {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      flex-shrink: 0;
      transition: all 0.2s;
      margin-top: 2px;
    }
    .complete-btn:hover {
      border-color: var(--mint);
      background: var(--mint-light);
    }
    .complete-btn.done {
      border-color: var(--mint);
      background: var(--mint);
      color: white;
    }
    .complete-btn.partial {
      border-color: var(--peach);
      background: var(--peach-light);
      color: var(--peach);
    }

    /* Attachments */
    .attachment-section {
      margin-top: 10px;
      padding-top: 8px;
    }
    .attachment-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 6px;
    }
    .attachment-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      background: var(--bg-input);
      border-radius: var(--radius-xs);
      font-size: 0.8rem;
      border: 1px solid var(--border-light);
    }
    .attachment-thumb {
      width: 40px;
      height: 40px;
      object-fit: cover;
      border-radius: var(--radius-xs);
      cursor: pointer;
      border: 1.5px solid var(--border);
      transition: transform 0.15s;
    }
    .attachment-thumb:hover {
      transform: scale(1.08);
      border-color: var(--primary);
    }
    .attachment-image {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .attachment-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }
    .attachment-name {
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 160px;
    }
    .attachment-actions {
      display: flex;
      gap: 4px;
    }
    .attachment-actions a,
    .attachment-actions button {
      font-size: 0.72rem;
      color: var(--primary);
      text-decoration: none;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
    }
    .attachment-actions button:hover {
      color: var(--danger);
    }

    /* Timeline */
    .timeline {
      position: relative;
      padding-left: 40px;
    }
    .timeline-marker {
      position: absolute;
      left: -40px;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      z-index: 1;
    }
    .timeline-line {
      position: absolute;
      left: -26px;
      top: 30px;
      bottom: -10px;
      width: 2px;
      background: var(--border);
    }

    /* Icon buttons */
    .icon-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: none;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.82rem;
      transition: all 0.15s;
      color: var(--text-muted);
    }
    .icon-btn:hover {
      background: var(--bg-hover);
      color: var(--primary);
    }
    .icon-btn.danger:hover {
      background: var(--danger-light);
      color: var(--danger);
    }

    /* ========== MOBILE ========== */
    @media (max-width: 768px) {
      .life-nav {
        flex-direction: column;
        align-items: flex-start;
        padding: 10px 14px;
        gap: 8px;
      }
      .life-nav-links {
        width: 100%;
        justify-content: flex-end;
        flex-wrap: wrap;
        gap: 6px;
      }
      .nav-user-badge {
        font-size: 0.78rem;
        padding: 4px 10px;
      }
      .nav-user-avatar {
        width: 20px;
        height: 20px;
        font-size: 0.6rem;
      }
      .life-container {
        padding: 14px 10px;
      }
      .life-header {
        flex-direction: column;
        align-items: stretch;
        gap: 10px;
      }
      .life-header > div {
        flex-direction: column;
      }
      .filter-bar {
        flex-wrap: wrap;
      }
      .filter-btn {
        flex: 1;
        text-align: center;
        padding: 7px 10px;
      }
      .life-header h2 {
        font-size: 1.25rem;
      }
      .life-header .btn {
        width: 100%;
        justify-content: center;
      }
      .project-grid {
        grid-template-columns: 1fr;
        gap: 12px;
      }
      .project-card {
        padding: 14px;
      }
      .detail-header {
        flex-direction: column;
      }
      .detail-actions {
        width: 100%;
      }
      .detail-actions .btn {
        flex: 1;
      }
      .modal-content {
        width: 96%;
        max-height: 88vh;
        border-radius: var(--radius-sm);
      }
      .modal-header {
        padding: 14px 16px 10px;
      }
      .modal-body {
        padding: 12px 16px 16px;
      }
      .step-tree-children {
        margin-left: 16px;
        padding-left: 8px;
      }
      .step-tree-actions {
        flex-wrap: wrap;
      }
      .complete-btn {
        width: 28px;
        height: 28px;
      }
      .attachment-item {
        flex-wrap: wrap;
        font-size: 0.78rem;
      }
      .attachment-thumb {
        width: 36px;
        height: 36px;
      }
    }
  </style>
</head>
<body>
  <nav class="life-nav">
    <div class="life-nav-brand" onclick="navigate('projects')">
      <span>&#x1F338;</span> 生活待办
    </div>
    <div class="life-nav-links">
      <a class="nav-link-btn" href="/projects.html">项目管理</a>
      <span class="nav-user-badge">
        <span class="nav-user-avatar" id="nav-avatar"></span>
        <span id="nav-username"></span>
      </span>
      <a class="nav-logout-btn" onclick="logout()">退出</a>
    </div>
  </nav>

  <div class="life-container">
    <main id="content"></main>
  </div>

  <!-- Toast -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Modal -->
  <div id="modal-overlay" class="modal-overlay hidden" onclick="if(event.target===this)closeModal()">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modal-title"></h3>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <script src="/js/life-app.js"></script>
</body>
</html>
